<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const _ET = 'cGF0MkFGdzZQSjdXUndHVC4xMWM3YzU3ODA2MzQyOWQxNzU3YTg5Y2E5YWJiNTIzZTEyMjM3MGM4ZjEzZWRlMzk5MGM3YjA5MGJkZTZiMzY0';
    const CONFIG = { token: atob(_ET), baseId: 'appfs8aXtirNbrbWa', tableName: 'Table 1' };

    let allListings = []; let curLang = 'zh';
    let map = L.map('map').setView([49.2827, -123.1207], 11);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const dict = {
        zh: {
            lblCity: "城市 / CITY", lblRent: "月租金 / RENT", lblBed: "卧室 / BED", cityAll: "全部地区", rentAll: "不限", bedAll: "不限",
            postCta: "拥有空置房源？免费发布至平台 / Have a vacancy?", btnPost: "屋主发布 / Post Listing", showContact: "🔒 点击显示联系方式",
            next: "明白，下一步 / Next", agree: "同意授权 / Agree", gen: "生成申请表单", copy: "复制表单文本 / Copy", email: "点击打开邮件发送 / Send Email",
            dob: "出生日期 / DOB (YYYY-MM-DD)", eff: "保单生效日期 / Effective Date (YYYY-MM-DD)", name: "姓名 / Full Name", phone: "电话 / Phone", emailLbl: "邮箱 / Email", addr: "租房地址 / Address",
            m_t2: "授权告知", m_c2: "作为大温持牌保险与房产专家团队，我们承诺保护您的隐私。本人授权 HavenNest 将提供的 6 项个人信息转交给官方承保机构进行报价预约。数据受隐私保护。",
            m_t3: "申请信息填写", m_t4: "表单已生成", ins: "租客保险咨询", move: "专业搬家服务", clean: "退房清洁服务",
            footer: "免责声明：本网站房源信息部分来自系统抓取，部分为屋主直发。HavenNest 团队致力于提供最真实的租赁信息及专业的保险服务。&copy; 2026 HavenNest App.",
            insPop: `<p><strong>为何您必须购买租客保险？</strong></p>
                    <p style="color:var(--primary); font-weight:bold;">购买租客保险不仅是房东的普遍要求，更是为您自己的生活和财产安全焊死最后一道防线。</p>
                    <ul style="padding-left:15px;">
                        <li><strong>财物保障：</strong>覆盖您的家具、电子产品及衣物。若因火灾、水淹或偷盗受损，保险将赔付。</li>
                        <li><strong>责任赔付：</strong>若因您的过失导致房屋受损（如忘关水龙头），保险将承担高昂法律赔付。</li>
                        <li><strong>访客保障：</strong>保障访客在您空间的意外受伤。</li>
                        <li><strong>生活补偿：</strong>房屋受损无法居住时的酒店食宿补助。</li>
                    </ul>`
        },
        en: {
            lblCity: "CITY", lblRent: "RENT", lblBed: "BED", cityAll: "All Regions", rentAll: "No Limit", bedAll: "Any",
            postCta: "Have a vacancy? Post it on HavenNest for free!", btnPost: "Post Listing", showContact: "🔒 Show Contact Info",
            next: "Next Step", agree: "Agree & Continue", gen: "Generate Form", copy: "Copy Text", email: "Send Application via Email",
            dob: "DOB (YYYY-MM-DD)", eff: "Effective Date (YYYY-MM-DD)", name: "Full Name", phone: "Phone", emailLbl: "Email", addr: "Rental Address",
            m_t2: "Authorization", m_c2: "By continuing, you authorize HavenNest to securely transfer your 6 details to our professional broker team for a customized quote. Your privacy is protected.",
            m_t3: "Fill in Details", m_t4: "Form Generated", ins: "Tenant Insurance", move: "Moving Service", clean: "Cleaning Service",
            footer: "Disclaimer: Listing info is sourced from both automated crawlers and direct posts. HavenNest is dedicated to rental accuracy and professional insurance services. &copy; 2026 HavenNest App.",
            insPop: `<p><strong>Why you need Tenant Insurance?</strong></p>
                    <p style="color:var(--primary); font-weight:bold;">It's more than a landlord's rule; it's the ultimate safety net for your belongings and financial peace of mind.</p>
                    <ul style="padding-left:15px;">
                        <li><strong>Contents:</strong> Replaces your furniture, tech, and clothes after fire or theft.</li>
                        <li><strong>Liability:</strong> Protects you from legal costs if you accidentally damage the building.</li>
                        <li><strong>Visitors:</strong> Covers medical bills if someone gets hurt in your home.</li>
                        <li><strong>Expenses:</strong> Pays for hotel stays if your home is uninhabitable during repairs.</li>
                    </ul>`
        }
    };

    function toggleLang(l) {
        curLang = l;
        document.getElementById('lang-zh').className = l === 'zh' ? 'active' : '';
        document.getElementById('lang-en').className = l === 'en' ? 'active' : '';
        updateUI();
    }

    function updateUI() {
        const d = dict[curLang];
        document.getElementById('lbl-city').innerText = d.lblCity;
        document.getElementById('lbl-rent').innerText = d.lblRent;
        document.getElementById('lbl-bed').innerText = d.lblBed;
        document.getElementById('post-cta-text').innerText = d.postCta;
        document.getElementById('btn-post-now').innerText = d.btnPost;
        document.getElementById('btn-next').innerText = d.next;
        document.getElementById('btn-agree').innerText = d.agree;
        document.getElementById('btn-gen').innerText = d.gen;
        document.getElementById('btn-copy').innerText = d.copy;
        document.getElementById('btn-email').innerText = d.email;
        document.getElementById('q_name').placeholder = d.name;
        document.getElementById('q_phone').placeholder = d.phone;
        document.getElementById('q_email').placeholder = d.emailLbl;
        document.getElementById('q_dob').placeholder = d.dob;
        document.getElementById('q_eff_date').placeholder = d.eff;
        document.getElementById('q_addr').placeholder = d.addr;
        document.getElementById('m_t2').innerText = d.m_t2;
        document.getElementById('m_c2').innerText = d.m_c2;
        document.getElementById('m_t3').innerText = d.m_t3;
        document.getElementById('m_t4').innerText = d.m_t4;
        document.getElementById('footer-text').innerHTML = d.footer;

        document.getElementById('f-city').innerHTML = `<option value="All">${d.cityAll}</option><option value="Vancouver">Vancouver</option><option value="Richmond">Richmond</option><option value="Burnaby">Burnaby</option><option value="Delta">Delta</option>`;
        document.getElementById('f-rent').innerHTML = `<option value="0-99999">${d.rentAll}</option><option value="0-2000">$2000-</option><option value="2000-4000">$2000-4000</option><option value="4000-99999">$4000+</option>`;
        document.getElementById('f-bed').innerHTML = `<option value="All">${d.bedAll}</option><option value="1">1 BR</option><option value="2">2 BR</option><option value="3">3+ BR</option>`;

        renderServices(); applyFilters();
    }

    async function init() {
        // 先渲染UI确保文字立显
        updateUI();
        const airtableUrl = `https://api.airtable.com/v0/${CONFIG.baseId}/${encodeURIComponent(CONFIG.tableName)}?filterByFormula={发布状态 (Status)}='已发布 (Live)'`;
        try {
            const res = await fetch(airtableUrl, { headers: { Authorization: `Bearer ${CONFIG.token}` } });
            const data = await res.json();
            const airtableItems = data.records.map(r => ({
                source: "屋主直发", title: r.fields['房源标题 (Listing Title)'], price: r.fields['月租金 (Monthly Rent)'],
                bed: r.fields['卧室数量 (Beds)'], bath: r.fields['卫浴数量 (Baths)'], city: r.fields['City'] || "Vancouver",
                image: r.fields['房源照片 (Photos)']?.[0]?.url, phone: r.fields['联系电话 (Phone)'], email: r.fields['电子邮箱 (Email)'],
                lat: 49.28 + (Math.random()-0.5)*0.02, lng: -123.12 + (Math.random()-0.5)*0.02
            }));
            
            try {
                const crawlRes = await fetch('listings.json?t=' + Date.now());
                const crawlItems = await crawlRes.json();
                const processed = crawlItems.map(i => {
                    const cleanPrice = i.price ? parseInt(String(i.price).replace(/[$,]/g, '')) : 0;
                    return { ...i, source: "抓取房源", price: cleanPrice, lat: (i.lat || 49.28) + (Math.random()-0.5)*0.015, lng: (i.lng || -123.12) + (Math.random()-0.5)*0.015 };
                });
                allListings = [...airtableItems, ...processed];
            } catch { allListings = airtableItems; }
            applyFilters();
        } catch(e) { console.error(e); }
    }

    function renderServices() {
        const d = dict[curLang];
        const svcs = [{k:'ins', i:'🛡️', t: d.ins}, {k:'move', i:'📦', t: d.move}, {k:'clean', i:'🧹', t: d.clean}];
        document.getElementById('service-ui').innerHTML = svcs.map(s => `<div class="service-item" onclick="openModal('${s.k}')"><div style="font-size:3rem; margin-bottom:10px;">${s.i}</div><strong>${s.t}</strong></div>`).join('');
    }

    function applyFilters() {
        const city = document.getElementById('f-city').value;
        const rent = document.getElementById('f-rent').value.split('-').map(Number);
        const bed = document.getElementById('f-bed').value;
        const filtered = allListings.filter(i => (city==='All' || i.city===city || i.location===city) && (i.price >= rent[0] && i.price <= rent[1]) && (bed==='All' || i.bed >= parseInt(bed)));
        
        const listUi = document.getElementById('listing-ui'); listUi.innerHTML = '';
        map.eachLayer(l => { if(l instanceof L.Marker) map.removeLayer(l); });

        filtered.forEach(i => {
            L.marker([i.lat, i.lng]).addTo(map).bindPopup(`<b>$${i.price}</b><br>${i.title}`);
            const card = document.createElement('div'); card.className = 'card';
            card.innerHTML = `<div class="card-img" style="background-image:url('${i.image || 'https://via.placeholder.com/400x300'}')"><div class="tag">${i.source}</div></div>
                <div class="card-body"><div class="price">$${i.price.toLocaleString()}</div><div style="font-weight:bold; height:3rem; overflow:hidden;">${i.title}</div>
                <div class="contact-box" onclick="revealContact(this, '${i.phone}', '${i.email}')">${dict[curLang].showContact}</div></div>`;
            listUi.appendChild(card);
        });
    }

    function revealContact(el, p, e) { el.innerHTML = `<div style="color:var(--primary)">📞 ${p || 'Protected'} <br> 📧 ${e || 'Protected'}</div>`; el.style.background = "#fff"; }
    function openModal(s) { 
        activeSvc = s; const d = dict[curLang];
        document.getElementById('m_t1').innerText = d[s];
        document.getElementById('m_c1').innerHTML = s === 'ins' ? d.insPop : `<p>Professional ${d[s]} to secure your rental journey.</p>`;
        document.getElementById('svcModal').style.display = 'flex'; nextStep(1); 
    }
    function closeModal() { document.getElementById('svcModal').style.display = 'none'; }
    function nextStep(s) { document.querySelectorAll('.step').forEach(el => el.classList.remove('active')); document.getElementById('step'+s).classList.add('active'); }
    function generateOutput() {
        const d = { n: document.getElementById('q_name').value, p: document.getElementById('q_phone').value, e: document.getElementById('q_email').value, a: document.getElementById('q_addr').value, dob: document.getElementById('q_dob').value, ed: document.getElementById('q_eff_date').value };
        document.getElementById('outputBox').value = `[HavenNest ${activeSvc.toUpperCase()}]\nName: ${d.n}\nPhone: ${d.p}\nEmail: ${d.e}\nDOB: ${d.dob}\nEffDate: ${d.ed}\nAddress: ${d.a}\nConsent: Yes`;
        nextStep(4);
    }
    function copyText() { document.getElementById('outputBox').select(); document.execCommand('copy'); alert('Copied!'); }
    function openEmail() { const b = encodeURIComponent(document.getElementById('outputBox').value); window.location.href = `mailto:support@havennestapp.com?subject=Inquiry&body=${b}`; }
    init();
</script>
</body>
</html>
